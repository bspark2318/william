news_queries:
  - "new AI model release announcement"
  - "AI benchmark results SOTA"
  - "OpenAI Anthropic Google DeepMind announcement"
  - "AI regulation bill legislation passed"
  - "AI startup funding Series"
  - "open source LLM release weights"
  - "AI safety research paper findings"
  - "robotics foundation model demo"
  - "AI chip GPU TPU production"
  - "multimodal model vision language"
  - "AI agent framework tool release"
  - "AI protein drug discovery results"

video_queries:
  - "AI news highlights this week"
  - "AI breakthrough announcement"
  - "latest AI research paper breakdown"
  - "LLM benchmark new model"
  - "AI product launch demo"
  - "AI industry analysis"
  - "foundation model release"

settings:
  news_results_per_query: 10
  video_results_per_query: 8
  max_news_searches_per_collect: 12
  max_video_searches_per_collect: 7
  min_video_views: 5000
  min_video_duration_seconds: 60
  max_video_duration_seconds: 2700
  heuristic_reject_bottom_pct: 25
  video_finalists: 10
  video_publish_lookback_days: 7
  ideal_video_duration_min: 300
  ideal_video_duration_max: 1500
